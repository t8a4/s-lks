<!DOCTYPE html>
<html>
<head>
<meta name="viewport"
content="width=device-width, initial-scale=1">

<style>
html, body {
    margin: 0;
    height: 100%;
    background: black;
    overflow: hidden;
}

#frameWrapper {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
}

iframe {
    width: 1280px;
    height: 720px;
    border: none;
    
    transform-origin: center center;
    position: absolute;
}
</style>
</head>

<body>

<div id="frameWrapper">
    <iframe id="pptFrame"></iframe>
</div>

<script>

const frame=document.getElementById("pptFrame");

/* зареждаме същия viewer */
frame.src="index.html"+window.location.hash;

function scaleFrame(){

    const scaleX=window.innerWidth/1280;
    const scaleY=window.innerHeight/720;

    const scale=Math.min(scaleX,scaleY);

    frame.style.transform=
        `scale(${scale})`;
}

window.addEventListener("resize",scaleFrame);
window.addEventListener("orientationchange",scaleFrame);

scaleFrame();

</script>
<script>

function fitIframe() {

    const iframe = document.querySelector("iframe");

    const baseWidth = 1280;
    const baseHeight = 720;

    const vw = window.innerWidth;
    const vh = window.innerHeight;

    const scale = Math.min(
        vw / baseWidth,
        vh / baseHeight
    );

    iframe.style.transform =
        `translate(-50%, -50%) scale(${scale})`;

    iframe.style.left = "50%";
    iframe.style.top = "50%";
}

window.addEventListener("resize", fitIframe);
window.addEventListener("orientationchange", fitIframe);
window.addEventListener("load", fitIframe);

</script>
<script>
let startX = 0;

document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {

    const diff =
        e.changedTouches[0].clientX - startX;

    if (Math.abs(diff) < 50) return;

    if (diff < 0)
        document.dispatchEvent(
            new KeyboardEvent("keydown",{key:"ArrowRight"})
        );
    else
        document.dispatchEvent(
            new KeyboardEvent("keydown",{key:"ArrowLeft"})
        );
});
</script>

</body>
</html>
